<!doctype html>
<!-- 이 파일은 www.edumgt.co.kr 의 에듀엠지티에 저작권이 있습니다 -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>class507 실습 UI — LLMOps</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-6">
  <div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-blue-700 mb-1">class507 웹 실습</h1>
    <p class="text-slate-500 mb-6">LLMOps · 프롬프트 관리</p>
    <div class="flex gap-3 mb-4">
      <button onclick="runCode('example')" class="px-5 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700">예제 실행</button>
      <button onclick="runCode('solution')" class="px-5 py-2 bg-teal-600 text-white rounded-lg font-semibold hover:bg-teal-700">솔루션 실행</button>
    </div>
    <div id="output" class="bg-white border border-slate-200 rounded-xl p-4 min-h-32 text-sm font-mono whitespace-pre-wrap text-slate-800">결과가 여기에 표시됩니다.</div>
  </div>
  <script>
    async function runCode(target) {
      document.getElementById('output').textContent = '실행 중...';
      try {
        const res = await fetch('/run', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({target})});
        const data = await res.json();
        document.getElementById('output').textContent = data.stdout || data.stderr || JSON.stringify(data);
      } catch(e) { document.getElementById('output').textContent = '오류: ' + e.message; }
    }
  </script>
</body>
</html>
