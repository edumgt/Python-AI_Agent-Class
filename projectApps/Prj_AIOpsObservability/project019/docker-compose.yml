services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PROJECT_ID: ${PROJECT_ID:-project019}
      PROJECT_NAME: ${PROJECT_NAME:-Prj_AIOpsObservability}
      PROJECT_TRACK: ${PROJECT_TRACK:-프로젝트-4}
      PROJECT_TOPIC: ${PROJECT_TOPIC:-AIOps 관측성·이상탐지·자동복구 · 단계 4/5 실전 검증}
    ports:
      - "${APP_HOST_PORT:-9119}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
