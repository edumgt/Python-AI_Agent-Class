services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PROJECT_ID: ${PROJECT_ID:-project006}
      PROJECT_NAME: ${PROJECT_NAME:-Prj_MLOpsPipeline}
      PROJECT_TRACK: ${PROJECT_TRACK:-프로젝트-2}
      PROJECT_TOPIC: ${PROJECT_TOPIC:-MLOps 파이프라인과 모델 레지스트리 · 단계 1/5 입문 이해}
    ports:
      - "${APP_HOST_PORT:-9106}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
