services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PROJECT_ID: ${PROJECT_ID:-project015}
      PROJECT_NAME: ${PROJECT_NAME:-Prj_LLMOpsRAGQuality}
      PROJECT_TRACK: ${PROJECT_TRACK:-프로젝트-3}
      PROJECT_TOPIC: ${PROJECT_TOPIC:-LLMOps/RAG 서비스 품질관리 · 단계 5/5 운영 최적화}
    ports:
      - "${APP_HOST_PORT:-9115}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
