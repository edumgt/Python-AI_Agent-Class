services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PROJECT_ID: ${PROJECT_ID:-project001}
      PROJECT_NAME: ${PROJECT_NAME:-Prj_PersonaVoiceAI}
      PROJECT_TRACK: ${PROJECT_TRACK:-프로젝트-1}
      PROJECT_TOPIC: ${PROJECT_TOPIC:-개인 맞춤 코칭 음성봇 PERSONA AI 만들기 · 단계 1/5 입문 이해}
    ports:
      - "${APP_HOST_PORT:-9101}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
