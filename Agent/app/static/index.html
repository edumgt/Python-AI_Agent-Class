<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Class Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .glass { backdrop-filter: blur(10px); }
  </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-80 -translate-x-full border-r border-slate-200 bg-white transition-transform duration-300 md:static md:translate-x-0">
      <div class="flex h-16 items-center justify-between border-b border-slate-200 px-5">
        <div>
          <p class="text-xs font-semibold tracking-wider text-blue-700">AI CLASS</p>
          <h1 class="text-lg font-bold">RAG Agent</h1>
        </div>
        <button id="closeSidebar" class="rounded-md bg-slate-100 px-2 py-1 text-sm md:hidden">닫기</button>
      </div>

      <div class="space-y-6 p-5">
        <section>
          <h2 class="mb-2 text-sm font-semibold text-slate-500">시스템 상태</h2>
          <div class="rounded-xl border border-slate-200 bg-slate-50 p-4">
            <p class="text-sm"><span class="font-semibold">상태:</span> <span id="healthStatus">확인 중...</span></p>
            <p class="mt-1 text-sm"><span class="font-semibold">컬렉션:</span> <span id="healthCollection">-</span></p>
            <p class="mt-1 text-sm"><span class="font-semibold">문서 수:</span> <span id="healthDocs">-</span></p>
          </div>
        </section>

        <section>
          <h2 class="mb-2 text-sm font-semibold text-slate-500">질의 설정</h2>
          <div class="space-y-3 rounded-xl border border-slate-200 bg-slate-50 p-4">
            <label class="block text-sm">
              <span class="mb-1 block text-slate-600">Top-K</span>
              <input id="topK" type="number" min="1" max="20" value="6" class="w-full rounded-lg border border-slate-300 px-3 py-2" />
            </label>
            <label class="flex items-center gap-2 text-sm">
              <input id="useLlm" type="checkbox" checked class="h-4 w-4" />
              LLM 답변 사용
            </label>
            <button id="reindexBtn" class="w-full rounded-lg bg-slate-900 px-3 py-2 text-sm font-semibold text-white hover:bg-slate-700">인덱스 재생성</button>
          </div>
        </section>
      </div>
    </aside>

    <div id="sidebarBackdrop" class="fixed inset-0 z-30 hidden bg-slate-900/40 md:hidden"></div>

    <main class="flex min-w-0 flex-1 flex-col">
      <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 px-4 py-3 glass md:px-6">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <button id="openSidebar" class="rounded-lg bg-slate-100 px-3 py-2 text-sm md:hidden">메뉴</button>
            <div>
              <p class="text-xs text-slate-500">Python / LLM / AI Agent 수업 Q&A</p>
              <h2 class="text-lg font-bold">오프캔버스 + 콘텐츠형 Agent UI</h2>
            </div>
          </div>
          <span class="rounded-full bg-blue-100 px-3 py-1 text-xs font-semibold text-blue-700">FastAPI + Chroma</span>
        </div>
      </header>

      <section class="flex-1 px-4 py-4 md:px-6 md:py-6">
        <div class="grid h-full gap-4 lg:grid-cols-[1.4fr_1fr]">
          <article class="flex min-h-[60vh] flex-col rounded-2xl border border-slate-200 bg-white p-4 shadow-sm md:p-5">
            <h3 class="mb-3 text-base font-semibold">질문 / 답변</h3>
            <div id="chatLog" class="flex-1 space-y-3 overflow-y-auto rounded-xl bg-slate-50 p-3">
              <div class="rounded-lg border border-blue-200 bg-blue-50 p-3 text-sm text-blue-900">
                질문을 입력하면 이 저장소에서 관련 근거를 찾아 답변합니다.
              </div>
            </div>
            <p id="answerMeta" class="mt-2 text-xs text-slate-500"></p>

            <form id="askForm" class="mt-4 space-y-2">
              <textarea id="question" rows="3" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none ring-blue-500 focus:ring" placeholder="예: class001에서 가상환경을 왜 쓰나요?"></textarea>
              <div class="flex items-center justify-end gap-2">
                <button type="submit" id="askBtn" class="rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700">질문하기</button>
              </div>
            </form>
          </article>

          <article class="flex min-h-[60vh] flex-col rounded-2xl border border-slate-200 bg-white p-4 shadow-sm md:p-5">
            <h3 class="mb-3 text-base font-semibold">검색 근거(Source)</h3>
            <div id="sources" class="flex-1 space-y-2 overflow-y-auto rounded-xl bg-slate-50 p-3 text-sm text-slate-700">
              아직 검색 결과가 없습니다.
            </div>
          </article>
        </div>
      </section>
    </main>
  </div>

  <script>
    const sidebar = document.getElementById("sidebar");
    const sidebarBackdrop = document.getElementById("sidebarBackdrop");
    const openSidebar = document.getElementById("openSidebar");
    const closeSidebar = document.getElementById("closeSidebar");

    function showSidebar() {
      sidebar.classList.remove("-translate-x-full");
      sidebarBackdrop.classList.remove("hidden");
    }

    function hideSidebar() {
      sidebar.classList.add("-translate-x-full");
      sidebarBackdrop.classList.add("hidden");
    }

    openSidebar?.addEventListener("click", showSidebar);
    closeSidebar?.addEventListener("click", hideSidebar);
    sidebarBackdrop?.addEventListener("click", hideSidebar);

    async function refreshHealth() {
      try {
        const res = await fetch("/health");
        const data = await res.json();
        document.getElementById("healthStatus").textContent = data.status;
        document.getElementById("healthCollection").textContent = data.collection;
        document.getElementById("healthDocs").textContent = String(data.documents);
      } catch (err) {
        document.getElementById("healthStatus").textContent = "error";
      }
    }

    document.getElementById("reindexBtn").addEventListener("click", async () => {
      const btn = document.getElementById("reindexBtn");
      btn.disabled = true;
      btn.textContent = "재색인 중...";
      try {
        const res = await fetch("/v1/reindex?force=true", { method: "POST" });
        if (!res.ok) throw new Error("reindex failed");
        await refreshHealth();
      } finally {
        btn.disabled = false;
        btn.textContent = "인덱스 재생성";
      }
    });

    function appendBubble(role, text) {
      const box = document.createElement("div");
      box.className = role === "user"
        ? "ml-auto max-w-[92%] rounded-xl bg-slate-900 px-3 py-2 text-sm text-white"
        : "max-w-[92%] rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm";
      box.textContent = text;
      const chatLog = document.getElementById("chatLog");
      chatLog.appendChild(box);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function renderSources(sources) {
      const root = document.getElementById("sources");
      if (!sources || sources.length === 0) {
        root.textContent = "검색된 근거가 없습니다.";
        return;
      }
      root.innerHTML = sources.map((s, i) => `
        <div class="rounded-lg border border-slate-200 bg-white p-3">
          <p class="text-xs font-semibold text-blue-700">#${i + 1} · score ${Number(s.score).toFixed(3)}</p>
          <p class="mt-1 break-all text-xs text-slate-500">${s.path}</p>
          <p class="mt-2 text-sm text-slate-700">${s.chunk.slice(0, 260)}${s.chunk.length > 260 ? "..." : ""}</p>
        </div>
      `).join("");
    }

    document.getElementById("askForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const q = document.getElementById("question").value.trim();
      if (!q) return;

      appendBubble("user", q);
      document.getElementById("question").value = "";

      const askBtn = document.getElementById("askBtn");
      askBtn.disabled = true;
      askBtn.textContent = "응답 생성 중...";

      try {
        const payload = {
          question: q,
          top_k: Number(document.getElementById("topK").value || 6),
          use_llm: document.getElementById("useLlm").checked,
        };
        const res = await fetch("/v1/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error("ask failed");
        const data = await res.json();
        appendBubble("assistant", data.answer || "응답이 비어 있습니다.");
        renderSources(data.sources || []);
        const meta = [];
        if (data.mode) meta.push(`mode=${data.mode}`);
        if (data.matched_subject) meta.push(`subject=${data.matched_subject}`);
        if (data.matched_class_id) meta.push(`class=${data.matched_class_id}`);
        document.getElementById("answerMeta").textContent = meta.join(" · ");
      } catch (err) {
        appendBubble("assistant", "요청 처리 중 오류가 발생했습니다. 서버 로그를 확인해 주세요.");
      } finally {
        askBtn.disabled = false;
        askBtn.textContent = "질문하기";
      }
    });

    refreshHealth();
  </script>
</body>
</html>
