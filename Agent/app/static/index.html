<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Class Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0: #f2f5ff;
      --bg1: #dce6ff;
      --card: #ffffffcc;
      --line: #cfd8ef;
      --ink: #1f2a44;
      --muted: #5f6e8c;
      --brand: #0f62fe;
      --brand2: #13b0a5;
      --warn: #f97316;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Space Grotesk", "IBM Plex Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 500px at 90% -20%, #c5f6f0 0%, transparent 60%),
        radial-gradient(800px 480px at 10% 0%, #d1d9ff 0%, transparent 60%),
        linear-gradient(160deg, var(--bg0), var(--bg1));
      min-height: 100vh;
    }
    .glass {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      box-shadow: 0 8px 28px rgba(40, 74, 140, 0.12);
    }
    .rise { animation: rise 0.45s ease both; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .gradient-chip {
      background: linear-gradient(120deg, var(--brand), var(--brand2));
      color: #fff;
    }
    .fancy-scroll::-webkit-scrollbar { width: 10px; }
    .fancy-scroll::-webkit-scrollbar-thumb { background: #c3cfe9; border-radius: 999px; }
  </style>
</head>
<body>
  <div class="relative flex min-h-screen">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-[21rem] -translate-x-full transition-transform duration-300 md:static md:translate-x-0 md:pl-4 md:py-4">
      <div class="glass h-full rounded-3xl p-5">
        <div class="mb-6 flex items-center justify-between">
          <div>
            <p class="text-[11px] font-bold tracking-[0.24em] text-blue-700">AI CLASS AGENT</p>
            <h1 class="mt-1 text-xl font-bold">RAG Control Deck</h1>
          </div>
          <button id="closeSidebar" class="rounded-xl border border-slate-300 bg-white px-3 py-1.5 text-sm md:hidden">닫기</button>
        </div>

        <section class="mb-5 rounded-2xl border border-blue-200 bg-blue-50/70 p-4 rise">
          <h2 class="mb-2 text-sm font-bold text-blue-700">시스템 상태</h2>
          <p class="text-sm"><span class="font-semibold">상태</span>: <span id="healthStatus">확인 중...</span></p>
          <p class="mt-1 text-sm"><span class="font-semibold">컬렉션</span>: <span id="healthCollection">-</span></p>
          <p class="mt-1 text-sm"><span class="font-semibold">문서 수</span>: <span id="healthDocs">-</span></p>
        </section>

        <section class="rounded-2xl border border-slate-200 bg-white/70 p-4 rise">
          <h2 class="mb-3 text-sm font-bold text-slate-700">질의 설정</h2>
          <label class="mb-3 block text-sm">
            <span class="mb-1 block text-slate-600">Top-K</span>
            <input id="topK" type="number" min="1" max="20" value="6" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2" />
          </label>
          <label class="mb-4 flex items-center gap-2 text-sm text-slate-700">
            <input id="useLlm" type="checkbox" checked class="h-4 w-4 rounded border-slate-300" />
            LLM 답변 사용
          </label>
          <button id="reindexBtn" class="w-full rounded-xl gradient-chip px-3 py-2 text-sm font-semibold transition hover:brightness-110">
            인덱스 재생성
          </button>
        </section>
      </div>
    </aside>

    <div id="sidebarBackdrop" class="fixed inset-0 z-30 hidden bg-slate-900/45 md:hidden"></div>

    <main class="flex min-w-0 flex-1 flex-col md:pr-4 md:py-4">
      <header class="glass sticky top-0 z-20 mx-4 mt-4 rounded-2xl px-4 py-3 md:mx-0 md:mt-0">
        <div class="flex items-center justify-between gap-4">
          <div class="flex items-center gap-3">
            <button id="openSidebar" class="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm md:hidden">메뉴</button>
            <div>
              <p class="text-xs text-slate-500">Python / LLM / AI Agent Q&A Workspace</p>
              <h2 class="text-lg font-bold">Ask, Trace, Ship</h2>
            </div>
          </div>
          <span class="gradient-chip rounded-full px-3 py-1 text-xs font-semibold">FastAPI + Chroma</span>
        </div>
      </header>

      <section class="flex-1 p-4 md:p-0 md:pt-4">
        <div class="grid h-full gap-4 lg:grid-cols-[1.45fr_1fr]">
          <article class="glass flex min-h-[60vh] flex-col rounded-3xl p-5">
            <div class="mb-3 flex items-center justify-between">
              <h3 class="text-base font-bold">질문 / 답변</h3>
              <span class="rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700">Live</span>
            </div>

            <div id="chatLog" class="fancy-scroll flex-1 space-y-3 overflow-y-auto rounded-2xl border border-slate-200 bg-white/70 p-3">
              <div class="rounded-2xl border border-blue-200 bg-blue-50 p-3 text-sm text-blue-900 rise">
                질문을 입력하면 저장소 근거를 찾고 답변과 출처를 함께 제공합니다.
              </div>
            </div>
            <p id="answerMeta" class="mt-2 text-xs text-slate-500"></p>

            <form id="askForm" class="mt-4 space-y-2">
              <textarea id="question" rows="3" class="w-full rounded-2xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-blue-500 focus:ring" placeholder="예: class001 준비 단계에서 반드시 확인할 설정은?" ></textarea>
              <div class="flex items-center justify-end">
                <button type="submit" id="askBtn" class="rounded-2xl gradient-chip px-4 py-2 text-sm font-semibold transition hover:brightness-110">
                  질문하기
                </button>
              </div>
            </form>
          </article>

          <article class="glass flex min-h-[60vh] flex-col rounded-3xl p-5">
            <div class="mb-3 flex items-center justify-between">
              <h3 class="text-base font-bold">검색 근거</h3>
              <span class="rounded-full bg-amber-100 px-3 py-1 text-xs font-semibold text-amber-700">Source</span>
            </div>
            <div id="sources" class="fancy-scroll flex-1 space-y-2 overflow-y-auto rounded-2xl border border-slate-200 bg-white/70 p-3 text-sm text-slate-700">
              아직 검색 결과가 없습니다.
            </div>
          </article>
        </div>
      </section>
    </main>
  </div>

  <script>
    const sidebar = document.getElementById("sidebar");
    const sidebarBackdrop = document.getElementById("sidebarBackdrop");
    const openSidebar = document.getElementById("openSidebar");
    const closeSidebar = document.getElementById("closeSidebar");

    function showSidebar() {
      sidebar.classList.remove("-translate-x-full");
      sidebarBackdrop.classList.remove("hidden");
    }

    function hideSidebar() {
      sidebar.classList.add("-translate-x-full");
      sidebarBackdrop.classList.add("hidden");
    }

    openSidebar?.addEventListener("click", showSidebar);
    closeSidebar?.addEventListener("click", hideSidebar);
    sidebarBackdrop?.addEventListener("click", hideSidebar);

    async function refreshHealth() {
      try {
        const res = await fetch("/health");
        const data = await res.json();
        document.getElementById("healthStatus").textContent = data.status;
        document.getElementById("healthCollection").textContent = data.collection;
        document.getElementById("healthDocs").textContent = String(data.documents);
      } catch (err) {
        document.getElementById("healthStatus").textContent = "error";
      }
    }

    document.getElementById("reindexBtn").addEventListener("click", async () => {
      const btn = document.getElementById("reindexBtn");
      btn.disabled = true;
      btn.textContent = "재색인 중...";
      try {
        const res = await fetch("/v1/reindex?force=true", { method: "POST" });
        if (!res.ok) throw new Error("reindex failed");
        await refreshHealth();
      } finally {
        btn.disabled = false;
        btn.textContent = "인덱스 재생성";
      }
    });

    function appendBubble(role, text) {
      const box = document.createElement("div");
      box.className = role === "user"
        ? "ml-auto max-w-[92%] rounded-2xl bg-slate-900 px-3 py-2 text-sm text-white rise"
        : "max-w-[92%] rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm rise";
      box.textContent = text;
      const chatLog = document.getElementById("chatLog");
      chatLog.appendChild(box);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function renderSources(sources) {
      const root = document.getElementById("sources");
      if (!sources || sources.length === 0) {
        root.textContent = "검색된 근거가 없습니다.";
        return;
      }
      root.innerHTML = sources.map((s, i) => `
        <div class="rounded-2xl border border-slate-200 bg-white p-3 rise">
          <p class="text-xs font-semibold text-blue-700">#${i + 1} · score ${Number(s.score).toFixed(3)}</p>
          <p class="mt-1 break-all text-xs text-slate-500">${s.path}</p>
          <p class="mt-2 text-sm text-slate-700">${s.chunk.slice(0, 260)}${s.chunk.length > 260 ? "..." : ""}</p>
        </div>
      `).join("");
    }

    document.getElementById("askForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const q = document.getElementById("question").value.trim();
      if (!q) return;

      appendBubble("user", q);
      document.getElementById("question").value = "";

      const askBtn = document.getElementById("askBtn");
      askBtn.disabled = true;
      askBtn.textContent = "응답 생성 중...";

      try {
        const payload = {
          question: q,
          top_k: Number(document.getElementById("topK").value || 6),
          use_llm: document.getElementById("useLlm").checked,
        };
        const res = await fetch("/v1/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error("ask failed");
        const data = await res.json();
        appendBubble("assistant", data.answer || "응답이 비어 있습니다.");
        renderSources(data.sources || []);
        const meta = [];
        if (data.mode) meta.push(`mode=${data.mode}`);
        if (data.matched_subject) meta.push(`subject=${data.matched_subject}`);
        if (data.matched_class_id) meta.push(`class=${data.matched_class_id}`);
        document.getElementById("answerMeta").textContent = meta.join(" · ");
      } catch (err) {
        appendBubble("assistant", "요청 처리 중 오류가 발생했습니다. 서버 로그를 확인해 주세요.");
      } finally {
        askBtn.disabled = false;
        askBtn.textContent = "질문하기";
      }
    });

    refreshHealth();
  </script>
</body>
</html>
