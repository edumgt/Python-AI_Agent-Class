<!doctype html>
<!-- 이 파일은 www.edumgt.co.kr 의 에듀엠지티에 저작권이 있습니다 -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>class009 5문항 퀴즈</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="mx-auto max-w-3xl px-4 py-10">
    <section class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
      <p class="text-sm font-semibold text-sky-700">class009 SELF QUIZ</p>
      <h1 class="mt-2 text-2xl font-bold">연산자와 조건문</h1>
      <p class="mt-2 text-sm text-slate-600">
        교과목: Python 프로그래밍 · 세부 시퀀스: 9/40 · 난이도: 기초응용 · Day 02 / 1교시
      </p>
      <p class="mt-4 rounded-lg bg-slate-50 p-3 text-sm text-slate-700">
        학습 내용 기반 심화 5문항 퀴즈입니다. 정답을 고른 뒤 채점 버튼을 누르세요.
      </p>
    </section>

    <section id="quiz-root" class="mt-6 space-y-4"></section>

    <div class="mt-6 flex items-center gap-3">
      <button id="grade-btn" class="rounded-lg bg-sky-600 px-5 py-2 text-sm font-semibold text-white hover:bg-sky-700">
        채점하기
      </button>
      <button id="reset-btn" class="rounded-lg bg-slate-200 px-5 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-300">
        다시풀기
      </button>
    </div>

    <div id="result-modal" class="fixed inset-0 z-50 hidden items-end justify-center p-3 sm:items-center sm:p-4" aria-hidden="true">
  <div id="result-backdrop" class="absolute inset-0 bg-slate-900/55 opacity-0 transition-opacity duration-200"></div>
  <section id="result-dialog" role="dialog" aria-modal="true" aria-labelledby="result-modal-title" class="relative z-10 w-full max-w-3xl translate-y-2 scale-[0.98] rounded-2xl bg-white p-5 opacity-0 shadow-xl ring-1 ring-slate-200 transition-all duration-200 sm:p-6">
    <div class="flex items-center justify-between gap-3">
      <h2 id="result-modal-title" class="text-lg font-bold text-slate-900">채점 결과</h2>
      <button id="result-close-btn" type="button" class="rounded-lg bg-slate-200 px-3 py-1.5 text-sm font-semibold text-slate-700 hover:bg-slate-300">닫기</button>
    </div>
    <section id="result-root" class="mt-4 max-h-[70vh] overflow-y-auto pr-1"></section>
  </section>
</div>
  </main>

  <script>
    const QUIZ_DATA = {
  "class_id": "class009",
  "subject_name": "Python 프로그래밍",
  "module": "연산자와 조건문",
  "level": "기초응용",
  "session": "9/40",
  "track_outcome": "비교/논리 연산으로 기본 분기를 구현할 수 있다.",
  "questions": [
    {
      "question": "`x = 5`, `y = 8`일 때 `x < y and y < 10`의 결과는?",
      "options": ["False", "True", "오류", "None"],
      "answer_index": 1,
      "explanation": "두 조건이 모두 참이므로 결과는 True입니다."
    },
    {
      "question": "아래 중 비교 연산자만으로 구성된 식은 무엇인가요?",
      "options": ["a + b", "a == b", "a and b", "not a"],
      "answer_index": 1,
      "explanation": "`==`는 비교 연산자입니다."
    },
    {
      "question": "`if score >= 70:`이 참일 때 실행되는 블록 설명으로 맞는 것은?",
      "options": ["항상 else 블록 실행", "조건이 참일 때만 들여쓴 코드 실행", "함수가 종료됨", "반복문이 시작됨"],
      "answer_index": 1,
      "explanation": "if는 조건이 True일 때만 해당 블록을 실행합니다."
    },
    {
      "question": "`if price >= 50000: discount = 0.1 else: discount = 0` 코드의 목적은?",
      "options": ["문자열 길이 계산", "조건에 따른 값 분기", "리스트 정렬", "예외 처리"],
      "answer_index": 1,
      "explanation": "조건문으로 할인율을 분기하고 있습니다."
    },
    {
      "question": "class009에서 배운 내용으로 가장 적절한 실습은?",
      "options": ["for 문으로 누적합 만들기", "파일 읽고 쓰기", "산술/비교/논리 결과표 만들기", "클래스 상속 구현"],
      "answer_index": 2,
      "explanation": "class009는 연산자와 조건문의 기초 확인 차시입니다."
    }
  ],
  "question_count": 5,
  "day": 2,
  "slot": 1
};

      const root = document.getElementById("quiz-root");
      root.innerHTML = "";

      QUIZ_DATA.questions.forEach((q, qIndex) => {
        const wrap = document.createElement("article");
        wrap.className = "rounded-xl bg-white p-5 shadow-sm ring-1 ring-slate-200";

        const title = document.createElement("h2");
        title.className = "text-base font-semibold";
        title.textContent = `${qIndex + 1}번. ${q.question}`;
        wrap.appendChild(title);

        const list = document.createElement("div");
        list.className = "mt-3 space-y-2";

        q.options.forEach((opt, optIndex) => {
          const label = document.createElement("label");
          label.className = "flex cursor-pointer items-start gap-2 rounded-lg border border-slate-200 p-3 hover:bg-slate-50";

          const radio = document.createElement("input");
          radio.type = "radio";
          radio.name = `q-${qIndex}`;
          radio.value = String(optIndex);
          radio.className = "mt-1";

          const text = document.createElement("span");
          text.className = "text-sm";
          text.textContent = opt;

          label.appendChild(radio);
          label.appendChild(text);
          list.appendChild(label);
        });

        wrap.appendChild(list);
        root.appendChild(wrap);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const details = [];
      const total = QUIZ_DATA.questions.length;

      QUIZ_DATA.questions.forEach((q, qIndex) => {
        const selected = document.querySelector(`input[name="q-${qIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const isCorrect = selectedIndex === q.answer_index;
        if (isCorrect) score += 1;

        details.push({
          number: qIndex + 1,
          isCorrect,
          correct: q.options[q.answer_index],
          chosen: selectedIndex >= 0 ? q.options[selectedIndex] : "미선택",
          explanation: q.explanation
        });
      });

      const resultRoot = document.getElementById("result-root");
      const resultModal = document.getElementById("result-modal");

      const percentage = Math.round((score / total) * 100);
      const headerClass = score === total ? "text-emerald-700" : "text-amber-700";
      const badgeClass = score === total
        ? "bg-emerald-100 text-emerald-700"
        : "bg-amber-100 text-amber-700";
      const barClass = score === total ? "bg-emerald-500" : "bg-amber-500";
      const summary = `
        <div class="rounded-xl border border-slate-200 bg-slate-50 p-4">
          <div class="flex items-center justify-between gap-3">
            <h3 class="text-lg font-bold ${headerClass}">점수: ${score} / ${total}</h3>
            <span class="rounded-full px-3 py-1 text-xs font-semibold ${badgeClass}">정답률 ${percentage}%</span>
          </div>
          <div class="mt-3 h-2.5 w-full rounded-full bg-slate-200">
            <div class="h-full rounded-full ${barClass}" style="width: ${percentage}%;"></div>
          </div>
        </div>
        <p class="mt-3 text-sm text-slate-600">틀린 문제는 해설을 확인하고 다시 풀어보세요.</p>
        <p class="mt-1 text-sm text-slate-600">학습 성과 힌트: ${QUIZ_DATA.track_outcome}</p>
      `;

      const rows = details.map((d) => `
        <li class="rounded-lg border border-slate-200 p-3">
          <p class="text-sm font-semibold">${d.number}번 - ${d.isCorrect ? "정답" : "오답"}</p>
          <p class="mt-1 text-sm">내 답: ${d.chosen}</p>
          <p class="text-sm">정답: ${d.correct}</p>
          <p class="mt-1 text-xs text-slate-500">${d.explanation}</p>
        </li>
      `).join("");

      resultRoot.innerHTML = `
        ${summary}
        <ul class="mt-4 space-y-2">${rows}</ul>
      `;
      const resultBackdrop = document.getElementById("result-backdrop");
      const resultDialog = document.getElementById("result-dialog");

      resultModal.classList.remove("hidden");
      resultModal.setAttribute("aria-hidden", "false");
      document.body.classList.add("overflow-hidden");

      requestAnimationFrame(() => {
        resultBackdrop.classList.remove("opacity-0");
        resultDialog.classList.remove("opacity-0", "translate-y-2", "scale-[0.98]");
      });
    }

    function closeResultModal() {
      const resultModal = document.getElementById("result-modal");
      const resultBackdrop = document.getElementById("result-backdrop");
      const resultDialog = document.getElementById("result-dialog");
      const resultRoot = document.getElementById("result-root");

      resultBackdrop.classList.add("opacity-0");
      resultDialog.classList.add("opacity-0", "translate-y-2", "scale-[0.98]");
      resultModal.setAttribute("aria-hidden", "true");
      document.body.classList.remove("overflow-hidden");

      window.setTimeout(() => {
        resultModal.classList.add("hidden");
        resultRoot.innerHTML = "";
      }, 200);
    }

    function resetQuiz() {
      document.querySelectorAll('input[type="radio"]').forEach((el) => {
        el.checked = false;
      });
      closeResultModal();
    }

    document.getElementById("grade-btn").addEventListener("click", gradeQuiz);
    document.getElementById("reset-btn").addEventListener("click", resetQuiz);
    document.getElementById("result-close-btn").addEventListener("click", closeResultModal);
    document.getElementById("result-backdrop").addEventListener("click", closeResultModal);
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeResultModal();
    });
    renderQuiz();
  </script>
</body>
</html>
