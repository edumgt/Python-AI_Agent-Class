    }

    html, body {
      margin: 0;
      padding: 0;

    }

    body.scroll-lock {
      overflow: hidden;
    }

    .container {
      width: min(1100px, 100% - 32px);
      margin: 28px auto 56px;
    }

    .hero {
      background: linear-gradient(140deg, #ffffff, #f8fbff);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: rgba(11, 95, 255, 0.1);
      color: var(--primary-strong);
    }

    .hero h1 {
      margin: 14px 0 8px;
      font-size: clamp(24px, 3.4vw, 34px);
      line-height: 1.22;
    }

    .meta {
      margin: 0;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.6;
    }

    .notice {
      margin-top: 16px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .notice-card {
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fbfdff;
      padding: 12px;
      font-size: 13px;
      color: var(--sub);
    }

    .btn-row {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }

    .btn.primary {
      background: linear-gradient(120deg, var(--primary), var(--primary-strong));
      color: #fff;
    }

    .btn.secondary {
      background: #e6edf9;
      color: #0b326c;
    }

    .btn.ghost {
      background: #eff9f7;
      color: #06645c;
      border: 1px solid #bee9e3;
    }

    .quiz-grid {
      margin-top: 18px;
      display: grid;
      gap: 14px;
    }

    .question {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.06);
      padding: 16px;
    }

    .question-title {
      margin: 0;
      font-weight: 700;
      line-height: 1.52;
      font-size: 15px;
    }

    .options {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      border: 1px solid #d7e0ef;
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      background: #fff;
      font-size: 14px;
    }

    .option:hover {
      background: #f5f8fd;
    }

    .option input {
      margin-top: 3px;
      accent-color: var(--primary);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      padding: 16px;
    }

    .modal.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal.hidden {
      display: none;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.52);
      backdrop-filter: blur(2px);
    }

    .modal-dialog {
      position: relative;
      z-index: 1;
      width: min(920px, 100%);
      max-height: 82vh;
      overflow: auto;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid var(--line);
      box-shadow: 0 30px 50px rgba(15, 23, 42, 0.24);
      padding: 18px;
      transform: translateY(10px) scale(0.98);
      transition: transform 0.18s ease;
    }

    .modal.show .modal-dialog {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 20px;
    }

    .close-btn {
      border: 0;
      border-radius: 10px;
      padding: 7px 12px;
      background: #eaf0fb;
      font-weight: 700;
      color: #29476f;
      cursor: pointer;
    }

    .result-summary {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #f8fbff;
    }

    .result-title {
      margin: 0;
      font-size: 20px;
    }

    .progress {
      margin-top: 10px;
      height: 10px;
      background: #dbe6f7;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > div {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(120deg, var(--primary), var(--accent));
    }

    .result-list {
      margin: 14px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .result-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      font-size: 14px;
      line-height: 1.55;
    }

    .ok {
      color: #0a7f51;
      font-weight: 700;
    }

    .bad {
      color: var(--danger);
      font-weight: 700;
    }

    .code-meta {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fbff;
      padding: 12px;
      font-size: 13px;
      color: var(--sub);
      line-height: 1.6;
    }

    .code-grid {
      margin-top: 10px;
      display: grid;
      gap: 10px;
    }

    .code-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #ffffff;
    }

    .code-card header {
      padding: 10px 12px;
      font-weight: 700;
      border-bottom: 1px solid var(--line);
      background: #f7faff;
      font-size: 13px;
    }

    .code-card pre {
      margin: 0;
      padding: 12px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.5;
      background: #0f172a;
      color: #d7e7ff;

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function openModal(modalId) {
      const modal = document.getElementById(modalId);
      if (!modal) return;
      modal.classList.remove("hidden");
      modal.setAttribute("aria-hidden", "false");
      requestAnimationFrame(() => modal.classList.add("show"));
      document.body.classList.add("scroll-lock");
    }

    function closeModal(modalId) {
      const modal = document.getElementById(modalId);
      if (!modal) return;
      modal.classList.remove("show");
      modal.setAttribute("aria-hidden", "true");
      window.setTimeout(() => {
        modal.classList.add("hidden");
        if (!document.querySelector(".modal.show")) {
          document.body.classList.remove("scroll-lock");
        }
      }, 180);
    }

    function renderQuiz() {
      const root = document.getElementById("quiz-root");
      root.innerHTML = "";

      QUIZ_DATA.questions.forEach((q, qIndex) => {
        const wrap = document.createElement("article");
        wrap.className = "question";

        const title = document.createElement("h2");
        title.className = "question-title";
        title.textContent = `${qIndex + 1}번. ${q.question}`;
        wrap.appendChild(title);

        const list = document.createElement("div");
        list.className = "options";

        q.options.forEach((opt, optIndex) => {
          const label = document.createElement("label");
          label.className = "option";

          const radio = document.createElement("input");
          radio.type = "radio";
          radio.name = `q-${qIndex}`;
          radio.value = String(optIndex);

          const text = document.createElement("span");
          text.textContent = `${optIndex + 1}) ${opt}`;

          label.appendChild(radio);
          label.appendChild(text);
          list.appendChild(label);
        });

        wrap.appendChild(list);
        root.appendChild(wrap);
      });
    }

    function renderCodeModal() {
      const ref = QUIZ_DATA.example_reference || {};
      const files = Array.isArray(ref.files) ? ref.files : [];
      const templates = Array.isArray(ref.templates) ? ref.templates : [];
      const imports = Array.isArray(ref.imports) ? ref.imports : [];
      const functions = Array.isArray(ref.functions) ? ref.functions : [];
      const byFile = ref.by_file && typeof ref.by_file === "object" ? ref.by_file : {};
      const snippets = Array.isArray(QUIZ_DATA.example_snippets) ? QUIZ_DATA.example_snippets : [];

      const fileMeta = files.map((file) => {
        const meta = byFile[file] || {};
        const template = meta.template || ref.template || "generic";
        const imp = Array.isArray(meta.imports) ? meta.imports.join(", ") : "(import 없음)";
        const fn = Array.isArray(meta.functions) ? meta.functions.join(", ") : "정보 없음";
        const ep = meta.entrypoint || ref.entrypoint || "main()";
        return `<div><b>${escapeHtml(file)}</b> · template=${escapeHtml(template)} · entry=${escapeHtml(ep)} · imports=${escapeHtml(imp || "(import 없음)")} · functions=${escapeHtml(fn || "정보 없음")}</div>`;
      }).join("");

      const meta = `
        <div><b>파일:</b> ${escapeHtml(files.join(", ") || "정보 없음")}</div>
        <div><b>템플릿(전체):</b> ${escapeHtml(templates.join(", ") || ref.template || "generic")}</div>
        <div><b>엔트리:</b> ${escapeHtml(ref.entrypoint || "main()")}</div>
        <div><b>imports:</b> ${escapeHtml(imports.join(", ") || "(import 없음)")}</div>
        <div><b>functions:</b> ${escapeHtml(functions.join(", ") || "정보 없음")}</div>
        <div><b>파일별 메타:</b></div>
        <div>${fileMeta || "정보 없음"}</div>
      `;
      document.getElementById("code-meta").innerHTML = meta;

      const list = document.getElementById("code-snippet-list");
      if (!snippets.length) {
        list.innerHTML = `
          <article class="code-card">
            <header>example 코드 미리보기</header>
            <pre>표시할 코드 스니펫이 없습니다.</pre>
          </article>
        `;
        return;
      }

      list.innerHTML = snippets.map((item) => `
        <article class="code-card">
          <header>${escapeHtml(item.file || "example1.py")}</header>
          <pre>${escapeHtml(item.code || "")}</pre>
        </article>
      `).join("");
    }

    function gradeQuiz() {
      let score = 0;
      const details = [];
      const total = QUIZ_DATA.questions.length;

      QUIZ_DATA.questions.forEach((q, qIndex) => {
        const selected = document.querySelector(`input[name="q-${qIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const isCorrect = selectedIndex === q.answer_index;
        if (isCorrect) score += 1;

        details.push({
          number: qIndex + 1,
          isCorrect,
          correct: q.options[q.answer_index],
          chosen: selectedIndex >= 0 ? q.options[selectedIndex] : "미선택",
          explanation: q.explanation
        });
      });

      const resultRoot = document.getElementById("result-root");
      const ratio = Math.round((score / total) * 100);
      const statusClass = score === total ? "ok" : "bad";
      const summary = `
        <article class="result-summary">
          <h3 class="result-title ${statusClass}">점수: ${score} / ${total} (${ratio}%)</h3>
          <p>학습 성과 힌트: ${escapeHtml(QUIZ_DATA.track_outcome || "")}</p>
          <div class="progress"><div style="width:${ratio}%"></div></div>
        </article>
      `;

      const rows = details.map((d) => `
        <li class="result-item">
          <div><b>${d.number}번</b> · <span class="${d.isCorrect ? "ok" : "bad"}">${d.isCorrect ? "정답" : "오답"}</span></div>
          <div>내 답: ${escapeHtml(d.chosen)}</div>
          <div>정답: ${escapeHtml(d.correct)}</div>
          <div>해설: ${escapeHtml(d.explanation)}</div>
        </li>
      `).join("");

      resultRoot.innerHTML = `
        ${summary}
        <ul class="result-list">${rows}</ul>
      `;
      openModal("result-modal");
    }

    function resetQuiz() {
      document.querySelectorAll('input[type="radio"]').forEach((el) => {
        el.checked = false;
      });
      document.getElementById("result-root").innerHTML = "";
      closeModal("result-modal");
    }

    function bindModalCloseButtons() {
      document.querySelectorAll("[data-close-modal]").forEach((el) => {
        el.addEventListener("click", () => closeModal(el.dataset.closeModal));
      });
      document.addEventListener("keydown", (event) => {
        if (event.key !== "Escape") return;
        closeModal("result-modal");
        closeModal("code-modal");
      });
    }

    document.getElementById("grade-btn").addEventListener("click", () => gradeQuiz());
    document.getElementById("reset-btn").addEventListener("click", () => resetQuiz());
    document.getElementById("open-code-btn").addEventListener("click", () => openModal("code-modal"));
    bindModalCloseButtons();
    renderQuiz();
    renderCodeModal();
  </script>
