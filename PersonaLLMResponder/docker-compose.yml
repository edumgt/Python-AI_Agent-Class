services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PROJECT_ID: ${PROJECT_ID:-project002}
      PROJECT_NAME: ${PROJECT_NAME:-거대 언어 모델을 활용한 PERSONA AI 답변 기능 구현하기}
      PROJECT_TRACK: ${PROJECT_TRACK:-프로젝트-B}
      PROJECT_TOPIC: ${PROJECT_TOPIC:-거대 언어 모델을 활용한 PERSONA AI 답변 기능 구현하기}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "${APP_HOST_PORT:-9102}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
