<!doctype html>
<!-- 이 파일은 www.edumgt.co.kr 의 에듀엠지티에 저작권이 있습니다 -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>class136 5문항 퀴즈</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="mx-auto max-w-3xl px-4 py-10">
    <section class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
      <p class="text-sm font-semibold text-sky-700">class136 SELF QUIZ</p>
      <h1 class="mt-2 text-2xl font-bold">NLP/STT/TTS 개요</h1>
      <p class="mt-2 text-sm text-slate-600">
        교과목: 자연어 및 음성 데이터 활용 및 모델 개발 · 세부 시퀀스: 8/96 · 난이도: 입문 · Day 17 / 8교시
      </p>
      <p class="mt-4 rounded-lg bg-slate-50 p-3 text-sm text-slate-700">
        학습 내용 기반 심화 5문항 퀴즈입니다. 정답을 고른 뒤 채점 버튼을 누르세요.
      </p>
    </section>

    <section id="quiz-root" class="mt-6 space-y-4"></section>

    <div class="mt-6 flex items-center gap-3">
      <button id="grade-btn" class="rounded-lg bg-sky-600 px-5 py-2 text-sm font-semibold text-white hover:bg-sky-700">
        채점하기
      </button>
      <button id="reset-btn" class="rounded-lg bg-slate-200 px-5 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-300">
        다시풀기
      </button>
    </div>

    <section id="result-root" class="mt-6 hidden rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200"></section>
  </main>

  <script>
    const QUIZ_DATA = {
  "class_id": "class136",
  "subject_name": "자연어 및 음성 데이터 활용 및 모델 개발",
  "module": "NLP/STT/TTS 개요",
  "level": "입문",
  "session": "8/96",
  "track_outcome": "음성 데이터 품질 지표를 계산하고 해석할 수 있다.",
  "questions": [
    {
      "question": "class136 (자연어 및 음성 데이터 활용 및 모델 개발 8/96) 차시의 실제 학습 주제는 무엇인가요?",
      "options": [
        "음성 데이터 구조 이해",
        "언어모델 입력 구조",
        "텍스트 분류 기초",
        "NLP/STT/TTS 개요"
      ],
      "answer_index": 3,
      "explanation": "정답은 'NLP/STT/TTS 개요' 입니다. 이전 모듈은 '없음', 다음 모듈은 '텍스트 데이터 수집' 입니다."
    },
    {
      "question": "'NLP/STT/TTS 개요' 차시의 실제 실습 목표를 가장 구체적으로 설명한 문장은 무엇인가요?",
      "options": [
        "실전 데이터셋 설계 실습: 예제의 발화 목록을 보고 길이/텍스트를 확인해요.",
        "특징 추출(MFCC 등) 실습: 예제의 발화 목록을 보고 길이/텍스트를 확인해요.",
        "오디오 전처리 실습: 예제의 발화 목록을 보고 길이/텍스트를 확인해요.",
        "NLP/STT/TTS 개요 실습: 예제의 발화 목록을 보고 길이/텍스트를 확인해요."
      ],
      "answer_index": 3,
      "explanation": "정답은 해당 차시 MD의 핵심 개념/실습 미션에서 직접 가져온 문장입니다."
    },
    {
      "question": "'NLP/STT/TTS 개요' 실습에서 오류를 줄이는 시작 전략으로 가장 적절한 것은 무엇인가요?",
      "options": [
        "검색 결과와 최종 답변을 분리해서 출력한다.",
        "핵심 개체를 클래스화하고 `__init__`·메서드·상태 전이를 테스트한다.",
        "중복 코드를 함수로 추출하고 입력·출력 계약을 먼저 정의한다.",
        "샘플 발화를 몇 개 확인하고 길이/라벨 기준으로 필터링한다."
      ],
      "answer_index": 3,
      "explanation": "정답은 실행 흐름을 먼저 검증하는 고효율 시작 루틴입니다."
    },
    {
      "question": "'NLP/STT/TTS 개요' 실습 결과를 왜곡할 가능성이 가장 큰 실수는 무엇인가요?",
      "options": [
        "가변 객체 공유(얕은 복사)를 놓쳐 예상치 못한 동시 변경이 발생한다.",
        "오디오 길이와 라벨 품질을 확인하지 않아 학습 데이터 잡음이 증가한다.",
        "전역 Python과 가상환경 Python을 섞어 패키지 설치 경로가 꼬인다.",
        "연산자 우선순위를 오해해 의도와 다른 조건 분기가 실행된다."
      ],
      "answer_index": 1,
      "explanation": "정답은 현장에서 자주 발생하는 품질 저하 패턴입니다."
    },
    {
      "question": "'NLP/STT/TTS 개요'를 끝낸 직후, 다음 학습 단계로 넘어가기 전 자기 점검 항목으로 가장 적절한 것은 무엇인가요?",
      "options": [
        "NLP/STT/TTS 개요 점검: 음성 샘플 하나를 데이터 항목으로 설명할 수 있다.",
        "텍스트 정제와 토큰화 점검: 토큰화 전/후 차이를 설명할 수 있다.",
        "음성 데이터 구조 이해 점검: 음성 샘플 하나를 데이터 항목으로 설명할 수 있다.",
        "특징 추출(MFCC 등) 점검: 음성 샘플 하나를 데이터 항목으로 설명할 수 있다."
      ],
      "answer_index": 0,
      "explanation": "이 차시는 '샘플 청취와 라벨 점검 후 길이/잡음 기준 필터링 로그를 남긴다.' 관점으로 검증해야 다음 단계로 안정적으로 연결됩니다."
    }
  ],
  "question_count": 5,
  "day": 17,
  "slot": 8
};

    function renderQuiz() {
      const root = document.getElementById("quiz-root");
      root.innerHTML = "";

      QUIZ_DATA.questions.forEach((q, qIndex) => {
        const wrap = document.createElement("article");
        wrap.className = "rounded-xl bg-white p-5 shadow-sm ring-1 ring-slate-200";

        const title = document.createElement("h2");
        title.className = "text-base font-semibold";
        title.textContent = `${qIndex + 1}번. ${q.question}`;
        wrap.appendChild(title);

        const list = document.createElement("div");
        list.className = "mt-3 space-y-2";

        q.options.forEach((opt, optIndex) => {
          const label = document.createElement("label");
          label.className = "flex cursor-pointer items-start gap-2 rounded-lg border border-slate-200 p-3 hover:bg-slate-50";

          const radio = document.createElement("input");
          radio.type = "radio";
          radio.name = `q-${qIndex}`;
          radio.value = String(optIndex);
          radio.className = "mt-1";

          const text = document.createElement("span");
          text.className = "text-sm";
          text.textContent = opt;

          label.appendChild(radio);
          label.appendChild(text);
          list.appendChild(label);
        });

        wrap.appendChild(list);
        root.appendChild(wrap);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const details = [];
      const total = QUIZ_DATA.questions.length;

      QUIZ_DATA.questions.forEach((q, qIndex) => {
        const selected = document.querySelector(`input[name="q-${qIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const isCorrect = selectedIndex === q.answer_index;
        if (isCorrect) score += 1;

        details.push({
          number: qIndex + 1,
          isCorrect,
          correct: q.options[q.answer_index],
          chosen: selectedIndex >= 0 ? q.options[selectedIndex] : "미선택",
          explanation: q.explanation
        });
      });

      const resultRoot = document.getElementById("result-root");
      resultRoot.classList.remove("hidden");

      const headerClass = score === total ? "text-emerald-700" : "text-amber-700";
      const summary = `
        <h3 class="text-lg font-bold ${headerClass}">점수: ${score} / ${total}</h3>
        <p class="mt-1 text-sm text-slate-600">틀린 문제는 해설을 확인하고 다시 풀어보세요.</p>
        <p class="mt-1 text-sm text-slate-600">학습 성과 힌트: ${QUIZ_DATA.track_outcome}</p>
      `;

      const rows = details.map((d) => `
        <li class="rounded-lg border border-slate-200 p-3">
          <p class="text-sm font-semibold">${d.number}번 - ${d.isCorrect ? "정답" : "오답"}</p>
          <p class="mt-1 text-sm">내 답: ${d.chosen}</p>
          <p class="text-sm">정답: ${d.correct}</p>
          <p class="mt-1 text-xs text-slate-500">${d.explanation}</p>
        </li>
      `).join("");

      resultRoot.innerHTML = `
        ${summary}
        <ul class="mt-4 space-y-2">${rows}</ul>
      `;
    }

    function resetQuiz() {
      document.querySelectorAll('input[type="radio"]').forEach((el) => {
        el.checked = false;
      });
      const resultRoot = document.getElementById("result-root");
      resultRoot.classList.add("hidden");
      resultRoot.innerHTML = "";
    }

    document.getElementById("grade-btn").addEventListener("click", gradeQuiz);
    document.getElementById("reset-btn").addEventListener("click", resetQuiz);
    renderQuiz();
  </script>
</body>
</html>
